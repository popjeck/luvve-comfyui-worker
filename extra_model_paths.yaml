# Points ComfyUI to models stored on the RunPod network volume.
# On serverless workers the volume "models_storage" mounts at /runpod-volume,
# and inside it the real ComfyUI models tree lives under ComfyUI/models.
# Verified by direct inspection of the volume (not from handoff docs).
luvve_volume:
    base_path: /runpod-volume/ComfyUI/

    checkpoints: models/checkpoints
    loras: models/loras
    vae: models/vae
    upscale_models: models/upscale_models
    embeddings: models/embeddings
    controlnet: models/controlnet
    clip: models/clip
    clip_vision: models/clip_vision
    ultralytics_bbox: models/ultralytics/bbox
    ultralytics_segm: models/ultralytics/segm
    sams: models/sams
